
services:
  # --- Reverse Proxy / Gateway ---
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true" # Active le dashboard sur 8080
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"      # API Gateway
      - "8080:8080"  # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # --- Database (Postgres) ---
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gatcha
      POSTGRES_PASSWORD: gatchapassword
    ports:
      - "5432:5432"
    volumes:
      # Monte le script d'initialisation (voir fichier suivant)
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  # --- Message Broker (Kafka) ---
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='

  # --- Kafka UI (Visualisation) ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  # --- Stamina Service ---
  stamina-service:
    build:
      context: .
      dockerfile: services/stamina-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/stamina_db
      QUARKUS_DATASOURCE_USERNAME: gatcha
      QUARKUS_DATASOURCE_PASSWORD: gatchapassword
      QUARKUS_HTTP_PORT: 8086
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QUARKUS_REST_CLIENT_AUTH_API_URL: http://auth-service:8081
    depends_on:
      - postgres
      - kafka
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stamina.rule=PathPrefix(`/stamina`)"
      - "traefik.http.routers.stamina.entrypoints=web"
      - "traefik.http.services.stamina.loadbalancer.server.port=8086"

  # --- Frontend (Next.js) ---
  nintcha-front:
    build:
      context: .
      dockerfile: nintcha-front/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
