services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nintcha-front

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gatcha
      POSTGRES_PASSWORD: gatchapassword
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatcha"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auth_db
      QUARKUS_DATASOURCE_USERNAME: gatcha
      QUARKUS_DATASOURCE_PASSWORD: gatchapassword
      QUARKUS_HTTP_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  player-service:
    build:
      context: .
      dockerfile: services/player-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/player_db
      QUARKUS_DATASOURCE_USERNAME: gatcha
      QUARKUS_DATASOURCE_PASSWORD: gatchapassword
      QUARKUS_HTTP_PORT: 8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QUARKUS_REST_CLIENT_AUTH_API_URL: http://auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  monster-service:
    build:
      context: .
      dockerfile: services/monster-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/monster_db
      QUARKUS_DATASOURCE_USERNAME: gatcha
      QUARKUS_DATASOURCE_PASSWORD: gatchapassword
      QUARKUS_HTTP_PORT: 8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QUARKUS_REST_CLIENT_AUTH_API_URL: http://auth-service:8081
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: drop-and-create
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  invocation-service:
    build:
      context: .
      dockerfile: services/invocation-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/invocation_db
      QUARKUS_DATASOURCE_USERNAME: gatcha
      QUARKUS_DATASOURCE_PASSWORD: gatchapassword
      QUARKUS_HTTP_PORT: 8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QUARKUS_REST_CLIENT_AUTH_API_URL: http://auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      stamina-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  fight-service:
    build:
      context: .
      dockerfile: services/fight-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/fight_db
      QUARKUS_DATASOURCE_USERNAME: gatcha
      QUARKUS_DATASOURCE_PASSWORD: gatchapassword
      QUARKUS_HTTP_PORT: 8085
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QUARKUS_REST_CLIENT_AUTH_API_URL: http://auth-service:8081
      QUARKUS_REST_CLIENT_PLAYER_API_URL: http://player-service:8082
      QUARKUS_REST_CLIENT_MONSTER_API_URL: http://monster-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      player-service:
        condition: service_healthy
      monster-service:
        condition: service_healthy
      stamina-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  stamina-service:
    build:
      context: .
      dockerfile: services/stamina-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/stamina_db
      QUARKUS_DATASOURCE_USERNAME: gatcha
      QUARKUS_DATASOURCE_PASSWORD: gatchapassword
      QUARKUS_HTTP_PORT: 8086
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QUARKUS_REST_CLIENT_AUTH_API_URL: http://auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  nintcha-front:
    build:
      context: .
      dockerfile: nintcha-front/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_API_URL: http://auth-service:8081
      PLAYER_API_URL: http://player-service:8082
      MONSTER_API_URL: http://monster-service:8083
      INVOCATION_API_URL: http://invocation-service:8084
      FIGHT_API_URL: http://fight-service:8085
      STAMINA_API_URL: http://stamina-service:8086
    depends_on:
      auth-service:
        condition: service_healthy
